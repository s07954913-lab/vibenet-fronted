<ion-header class="ion-no-border">

  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon
          slot="icon-only"
          name="chevron-back-outline"
          style="color: orange;">
        </ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>
      {{ ui?.title }}
    </ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="sharePost()">
        <ion-icon
          slot="icon-only"
          name="share-social-outline">
        </ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <div
    style="
      width:100%;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 20px rgba(0,0,0,0.1);
    "
  >
    <img
      [src]="post?.img"
      style="
        width:100%;
        height:350px;
        object-fit:cover;
      "
    />
  </div>

  <div style="margin-top:20px;">

    <h1 style="font-weight:800; font-size:1.8rem; margin:0;">
      {{ post?.title }}
    </h1>

    <p style="color:#666; font-size:1rem;">
      {{ post?.category }}
    </p>

    <div
      style="
        display:flex;
        gap:15px;
        margin-top:15px;
        color:#888;
        align-items:center;
      "
    >

      <span
        (click)="toggleLike()"
        style="cursor:pointer; display:flex; align-items:center; gap:5px;"
      >
        <ion-icon
          [name]="isLiked ? 'heart' : 'heart-outline'"
          [style.color]="isLiked ? 'red' : '#888'"
          style="font-size:24px;">
        </ion-icon>
        {{ likesCount }} {{ ui?.likes }}
      </span>

      <span>
        <ion-icon name="eye-outline" style="vertical-align:middle;"></ion-icon>
        {{ ui?.views }}
      </span>

    </div>

    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">

    <h3>{{ ui?.gen_details }}</h3>

    <div
      style="
        background:#f9f9f9;
        padding:15px;
        border-radius:12px;
        border-left:5px solid orange;
      "
    >
      <p style="font-style:italic; color:#444; margin:0; line-height:1.5;">
        "{{ post?.title }}" {{ ui?.gen_desc }}
      </p>
    </div>

    <ion-button
      (click)="downloadImage()"
      expand="block"
      color="warning"
      style="
        margin-top:30px;
        --border-radius:25px;
        height:55px;
        font-weight:bold;
      "
    >
      <ion-icon slot="start" name="download-outline"></ion-icon>
      {{ ui?.download }}
    </ion-button>

  </div>

</ion-content>
